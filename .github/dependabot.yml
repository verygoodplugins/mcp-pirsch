version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      runtime-dependencies:
        dependency-type: "production"
      toolchain:
        dependency-type: "development"
        patterns:
          - "@eslint/js"
          - "@types/*"
          - "@vitest/coverage-v8"
          - "eslint"
          - "eslint-config-prettier"
          - "prettier"
          - "tsx"
          - "typescript"
          - "typescript-eslint"
          - "vitest"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
